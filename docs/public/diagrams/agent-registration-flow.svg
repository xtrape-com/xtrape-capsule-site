<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Agent registration flow</title>
  <desc id="desc">A registration token is exchanged once for an agent token, then the agent reports health, services, and command results.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 10; }
      .token { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 10; }
      .text { fill: #0f172a; font: 600 21px system-ui, sans-serif; }
      .small { fill: #475569; font: 15px system-ui, sans-serif; }
      .line { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .label { fill: #1d4ed8; font: 700 13px system-ui, sans-serif; letter-spacing: .08em; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="520"/>
  <text class="label" x="70" y="70">BOOTSTRAP</text>
  <rect class="box" x="70" y="95" width="210" height="110"/>
  <text class="text" x="104" y="140">Operator</text>
  <text class="small" x="104" y="168">creates token in UI</text>
  <path class="line" d="M 285 150 H 380"/>
  <rect class="token" x="385" y="95" width="260" height="110"/>
  <text class="text" x="425" y="140">Registration Token</text>
  <text class="small" x="425" y="168">single-use bootstrap secret</text>
  <path class="line" d="M 650 150 H 745"/>
  <rect class="box" x="750" y="95" width="300" height="110"/>
  <text class="text" x="790" y="140">Embedded Agent</text>
  <text class="small" x="790" y="168">POST /api/agents/register</text>

  <path class="line" d="M 900 210 V 305"/>
  <rect class="box" x="750" y="310" width="300" height="110"/>
  <text class="text" x="790" y="355">Agent Token</text>
  <text class="small" x="790" y="383">stored locally, reused</text>
  <path class="line" d="M 745 365 H 650"/>
  <rect class="box" x="385" y="310" width="260" height="110"/>
  <text class="text" x="430" y="355">Steady State</text>
  <text class="small" x="430" y="383">heartbeat, report, poll</text>
  <path class="line" d="M 380 365 H 285"/>
  <rect class="box" x="70" y="310" width="210" height="110"/>
  <text class="text" x="112" y="355">Opstage</text>
  <text class="small" x="112" y="383">inventory and audit</text>
</svg>
